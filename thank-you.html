<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanks! — S&amp;S Property Services</title>
<meta name="robots" content="noindex">
<style>
:root{
  --primary: #2e7d32;
  --dark:    #1b3022;
  --accent:  #f9a825;
  --light:   #f4f7f2;
  --ink:     #26302b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;color:var(--ink);
  background:linear-gradient(135deg,var(--dark) 0%,color-mix(in srgb,var(--dark) 55%,var(--primary)) 100%);
  min-height:100vh;display:grid;place-items:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:48px 40px;max-width:520px;text-align:center;
  box-shadow:0 12px 40px rgba(0,0,0,.25)}
.badge{width:64px;height:64px;border-radius:50%;background:color-mix(in srgb,var(--primary) 14%,white);
  display:grid;place-items:center;margin:0 auto 20px;font-size:1.8rem;color:var(--primary)}
h1{color:var(--dark);font-size:1.6rem;margin-bottom:12px}
p{color:#4c5a52;margin-bottom:26px}
a{display:inline-block;background:var(--primary);color:#fff;padding:12px 26px;border-radius:999px;
  text-decoration:none;font-weight:700}
a:hover{background:var(--dark)}
</style>
</head>
<body>
  <div class="card">
    <div class="badge">✓</div>
    <h1>Thanks — we got your message!</h1>
    <p>We'll get back to you shortly, usually within 24 hours. Talk soon!</p>
    <a href="/">Back to the site</a>
  </div>
</body>
</html>
